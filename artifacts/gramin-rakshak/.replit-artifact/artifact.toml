kind = "web"
previewPath = "/"
title = "Gramin Rakshak"
version = "1.0.0"
id = "artifacts/gramin-rakshak"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25405

[services.development]
run = "pnpm --filter @workspace/gramin-rakshak run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gramin-rakshak", "run", "build" ]
publicDir = "artifacts/gramin-rakshak/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25405"
BASE_PATH = "/"
