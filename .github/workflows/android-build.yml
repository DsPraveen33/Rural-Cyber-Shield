name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Build Web App
        run: |
          cd artifacts/gramin-rakshak
          pnpm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sync Capacitor
        run: |
          cd artifacts/gramin-rakshak
          pnpm exec cap sync

      - name: Build Android APK
        run: |
          cd artifacts/gramin-rakshak/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GraminRakshak-Android-App
          path: artifacts/gramin-rakshak/android/app/build/outputs/apk/debug/app-debug.apk
