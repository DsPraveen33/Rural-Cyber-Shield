openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Gramin Rakshak API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chat
    description: Gramin Mitra AI chat
  - name: tips
    description: Security tips
  - name: quiz
    description: Cyber safety quiz
  - name: threats
    description: Threat information
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send message to Gramin Mitra AI
      description: Sends a user message and returns an AI response about cyber safety
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /tips:
    get:
      operationId: getTips
      tags: [tips]
      summary: Get security tips
      description: Returns a list of cyber safety tips
      responses:
        "200":
          description: List of tips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SecurityTip"

  /tips/daily:
    get:
      operationId: getDailyTip
      tags: [tips]
      summary: Get tip of the day
      description: Returns today's featured cyber safety tip
      responses:
        "200":
          description: Daily tip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityTip"

  /threats:
    get:
      operationId: getThreats
      tags: [threats]
      summary: Get common threats
      description: Returns a list of common cyber threats targeting rural users
      responses:
        "200":
          description: List of threats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Threat"

  /quiz/questions:
    get:
      operationId: getQuizQuestions
      tags: [quiz]
      summary: Get quiz questions
      description: Returns cyber safety quiz questions
      responses:
        "200":
          description: Quiz questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizQuestion"

  /quiz/submit:
    post:
      operationId: submitQuiz
      tags: [quiz]
      summary: Submit quiz answers
      description: Submits quiz answers and returns score with feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizSubmission"
      responses:
        "200":
          description: Quiz result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"

  /check-link:
    post:
      operationId: checkLink
      tags: [chat]
      summary: Check if a URL is safe or phishing
      description: Analyses a URL for phishing signals and returns a safety verdict
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckLinkInput"
      responses:
        "200":
          description: Link analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckLinkResult"

  /stats:
    get:
      operationId: getCommunityStats
      tags: [health]
      summary: Get community safety statistics
      description: Returns community-wide safety metrics and scores
      responses:
        "200":
          description: Community stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityStats"

  /reports:
    get:
      operationId: getReports
      tags: [reports]
      summary: Get recent scam reports
      description: Returns a list of recently reported scams by the community
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
    post:
      operationId: submitReport
      tags: [reports]
      summary: Submit a new scam report
      description: Submits a new scam report to the community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportScamInput"
      responses:
        "200":
          description: Report submission result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  id:
                    type: integer

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ChatMessageInput:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: User's message to the AI assistant
        language:
          type: string
          enum: [en, te]
          description: Preferred response language (en=English, te=Telugu)

    ChatResponse:
      type: object
      required:
        - reply
      properties:
        reply:
          type: string
          description: AI assistant's response
        suggestedActions:
          type: array
          items:
            type: string
          description: Suggested follow-up actions or links

    SecurityTip:
      type: object
      required:
        - id
        - title
        - body
        - category
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        category:
          type: string
          enum: [phishing, upi, aadhaar, password, whatsapp, general]
        icon:
          type: string

    Threat:
      type: object
      required:
        - id
        - name
        - description
        - severity
        - icon
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [critical, high, moderate, monitor]
        icon:
          type: string
        learnMoreUrl:
          type: ["string", "null"]

    QuizQuestion:
      type: object
      required:
        - id
        - question
        - options
        - correctIndex
      properties:
        id:
          type: integer
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctIndex:
          type: integer
        explanation:
          type: string

    QuizSubmission:
      type: object
      required:
        - answers
      properties:
        answers:
          type: array
          items:
            type: object
            required:
              - questionId
              - selectedIndex
            properties:
              questionId:
                type: integer
              selectedIndex:
                type: integer

    QuizResult:
      type: object
      required:
        - score
        - total
        - percentage
        - feedback
      properties:
        score:
          type: integer
        total:
          type: integer
        percentage:
          type: integer
        feedback:
          type: string
        badge:
          type: ["string", "null"]
          description: Badge earned (e.g. Cyber Safe Champion)

    CheckLinkInput:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: The URL or SMS text to analyse
        language:
          type: string
          enum: [en, te]
          description: Response language

    CheckLinkResult:
      type: object
      required:
        - content
        - verdict
        - explanation
        - signals
      properties:
        content:
          type: string
        verdict:
          type: string
          enum: [safe, suspicious, dangerous]
        explanation:
          type: string
        signals:
          type: array
          items:
            type: string

    CommunityStats:
      type: object
      required:
        - safetyScore
        - internetUsersPercent
        - scamVictimsPercent
        - readinessPercent
        - awarenessCount
      properties:
        safetyScore:
          type: integer
          description: Community safety score out of 100
        internetUsersPercent:
          type: integer
        scamVictimsPercent:
          type: integer
        readinessPercent:
          type: integer
        awarenessCount:
          type: string
          description: e.g. "5k+"
        trend:
          type: string
          description: Trend description

    ReportScamInput:
      type: object
      required:
        - scamType
        - description
        - district
      properties:
        scamType:
          type: string
          description: The type of scam (e.g., Phishing, OTP, UPI)
        description:
          type: string
          description: Details of the scam
        district:
          type: string
          description: District where it occurred
        contactNumber:
          type: string
          description: Associated phone number or UPI ID (optional)
        severity:
          type: string
          enum: [critical, high, moderate, monitor]

    Report:
      type: object
      required:
        - id
        - scamType
        - description
        - district
        - severity
        - createdAt
      properties:
        id:
          type: integer
        scamType:
          type: string
        description:
          type: string
        district:
          type: string
        contactNumber:
          type: ["string", "null"]
        severity:
          type: string
          enum: [critical, high, moderate, monitor]
        createdAt:
          type: string
          format: date-time
