services:
  - type: web
    name: rural-cyber-shield-api
    env: node
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: cd artifacts/api-server && node --env-file-if-exists=.env ./dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "10000"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=250"
      - key: NODE_VERSION
        value: "20"
      - key: GEMINI_API_KEY
        sync: false
